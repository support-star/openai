<html lang="de">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{color-scheme:dark;--bg:#0b1220;--card:#121b2f;--border:#26334f;--blue:#2a63ff;--green:#1f6d41;--green2:#2f9860;--red:#7b2d2d;--red2:#a04747;--orange:#8b5e00;--orange2:#c98500;--text:#e8eefc;--muted:#9dadcd;--label:#aab6d6;--input-bg:#0f1729;--input-border:#34486f;--radius:10px;--header-h:48px;--nav-h:60px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app-header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100}
.app-header h1{font-size:16px;font-weight:600}
.app-header .user-info{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.app-header .user-info .avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.btn-logout{background:none;border:none;color:var(--red2);cursor:pointer;font-size:13px;padding:4px 8px}
.page-content{padding:calc(var(--header-h) + 8px) 12px calc(var(--nav-h) + 12px);max-width:960px;margin:0 auto;min-height:100vh}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--muted);font-size:10px;padding:6px 12px;border-radius:8px;transition:.2s}
.bottom-nav a.active{color:var(--blue)}
.bottom-nav a .nav-icon{font-size:20px;line-height:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:600;margin-bottom:10px}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
label{display:block;font-size:12px;color:var(--label);margin-bottom:4px}
input,select,textarea{width:100%;border-radius:8px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);padding:10px;font-size:14px;font-family:inherit}
textarea{min-height:80px;resize:vertical}
select{appearance:auto}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-success{background:var(--green);border-color:var(--green2);color:#fff}
.btn-danger{background:var(--red);border-color:var(--red2);color:#fff}
.btn-warning{background:var(--orange);border-color:var(--orange2);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.badge-blue{background:rgba(42,99,255,.2);color:#6b9fff}
.badge-green{background:rgba(31,109,65,.2);color:#5ec88a}
.badge-red{background:rgba(123,45,45,.2);color:#e07070}
.badge-orange{background:rgba(139,94,0,.2);color:#e8b84a}
.badge-gray{background:rgba(157,173,205,.15);color:var(--muted)}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.kpi-value{font-size:22px;font-weight:700;margin-bottom:2px}
.kpi-label{font-size:11px;color:var(--muted)}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.list-item:last-child{border-bottom:none}
.list-item:active{background:rgba(42,99,255,.08)}
.list-item-main{flex:1;min-width:0}
.list-item-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item-sub{font-size:12px;color:var(--muted);margin-top:2px}
.search-bar{position:relative;margin-bottom:12px}
.search-bar input{padding-left:36px}
.search-bar::before{content:"";position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid var(--muted);border-radius:50%}
.filter-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;-webkit-overflow-scrolling:touch}
.filter-chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:99px;font-size:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff}
.fab{position:fixed;bottom:calc(var(--nav-h) + 16px);right:16px;width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:50;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.93)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);border-top:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px 16px;animation:slideUp .25s ease}
.modal-full{border-radius:0;max-height:100vh;height:100vh}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h2{font-size:18px}
.modal-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:4px}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;z-index:300;animation:fadeIn .2s;max-width:90%}
.toast-success{background:var(--green);color:#fff}
.toast-error{background:var(--red2);color:#fff}
.toast-info{background:var(--blue);color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:12px;overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:8px 6px;font-size:13px;border-bottom:1px solid var(--border)}
th{color:var(--label);font-weight:500;font-size:11px;text-transform:uppercase}
.text-right{text-align:right}
.text-center{text-align:center}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.gap-8{gap:8px}
.flex{display:flex}.flex-between{justify-content:space-between}.flex-center{align-items:center}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .empty-icon{font-size:40px;margin-bottom:8px;opacity:.5}
.empty-state p{font-size:14px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.detail-header{margin-bottom:16px}
.detail-header h2{font-size:18px;margin-bottom:4px}
.detail-header .detail-sub{font-size:13px;color:var(--muted)}
.line-items th,.line-items td{padding:6px 4px;font-size:12px}
.line-items input{padding:6px;font-size:12px}
.line-items .btn-sm{padding:4px 8px}
.sum-table{margin-left:auto;width:200px}
.sum-table td{padding:4px 8px;font-size:13px}
.sum-table .total{font-weight:700;font-size:15px;border-top:2px solid var(--border)}
.timer-display{font-size:48px;font-weight:700;text-align:center;padding:20px;font-variant-numeric:tabular-nums}
.timer-active{color:var(--green2)}
.timer-paused{color:var(--orange2)}
.chart-bar-container{display:flex;align-items:flex-end;gap:4px;height:120px;padding:8px 0}
.chart-bar{flex:1;background:var(--blue);border-radius:4px 4px 0 0;min-height:2px;position:relative;transition:.3s}
.chart-bar-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap}
.chart-bar-value{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text)}

.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px;width:100%;max-width:380px}

.login-card .login-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:250;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:340px;width:100%;text-align:center}
.confirm-box p{margin-bottom:16px;font-size:14px}
@media print{
.app-header,.bottom-nav,.fab,.no-print{display:none!important}
.page-content{padding:0!important}
body{background:#fff!important;color:#000!important}
.card{border:1px solid #ccc!important;background:#fff!important}
.print-invoice{background:#fff;color:#000;padding:20mm}
.print-invoice *{color:#000!important}
}

  _gs(k){ return JSON.parse(localStorage.getItem('erp_'+k)||'null'); },
  _ss(k,v){ localStorage.setItem('erp_'+k,JSON.stringify(v)); },
  getAll(c){ return this._g(c); },
  getById(c,id){ return this._g(c).find(r=>r.id===id); },
  save(c,rec){
    const all=this._g(c);
    const idx=all.findIndex(r=>r.id===rec.id);
    rec.aktualisiert=Date.now();
    if(idx>=0) all[idx]=rec; else { rec.erstellt=rec.erstellt||Date.now(); all.push(rec); }
    this._s(c,all);
    return rec;
  },
  remove(c,id){ this._s(c,this._g(c).filter(r=>r.id!==id)); },
  genId(prefix){ return prefix+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,4); },
  nextNr(typ){
    const c=this._gs('counters')||{};
    const y=new Date().getFullYear();
    const key=typ+'_'+y;
    c[key]=(c[key]||0)+1;
    this._ss('counters',c);
    return typ.toUpperCase()+'-'+y+'-'+String(c[key]).padStart(3,'0');
  },
  session(v){ if(v===undefined) return this._gs('session'); this._ss('session',v); },
  settings(v){ if(v===undefined) return this._gs('settings')||{...COMPANY}; this._ss('settings',v); },
  seed(){
    if(this._gs('seeded')) return;
    this._s('mitarbeiter',SEED_EMPLOYEES);
    this._s('kunden',SEED_CUSTOMERS);
    this._s('projekte',SEED_PROJECTS);

/* ===== UTILITIES ===== */
function fmt(n){return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n);}
function fmtN(n){return new Intl.NumberFormat('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);}
function fmtD(ts){if(!ts)return'-';const d=new Date(ts);return d.toLocaleDateString('de-DE');}
function fmtDI(iso){if(!iso)return'-';const p=iso.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function fmtT(ts){return new Date(ts).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}
function fmtDur(ms){const h=Math.floor(ms/3600000);const m=Math.floor((ms%3600000)/60000);return h+'h '+m+'m';}
function today(){return new Date().toISOString().split('T')[0];}
function calcPositionen(pos){
  const netto=pos.reduce((s,p)=>s+(p.menge*p.einzelpreis),0);
  const mwst=netto*0.19;
  return{netto,mwst,brutto:netto+mwst};
}
function empName(id){const e=DB.getById('mitarbeiter',id);return e?e.vorname+' '+e.nachname:'Unbekannt';}
function kundeName(id){const k=DB.getById('kunden',id);if(!k)return'Unbekannt';return k.firma||k.vorname+' '+k.nachname;}
function rolleLabel(r){return{GF:'Geschäftsführer',BU:'Büro',MO:'Monteur'}[r]||r;}
function statusBadge(s,map){const m=map[s]||{label:s,cls:'badge-gray'};return`<span class="badge ${m.cls}">${m.label}</span>`;}
const AUFTRAG_STATUS={neu:{label:'Neu',cls:'badge-gray'},geplant:{label:'Geplant',cls:'badge-blue'},in_arbeit:{label:'In Arbeit',cls:'badge-orange'},abgeschlossen:{label:'Abgeschlossen',cls:'badge-green'},abgerechnet:{label:'Abgerechnet',cls:'badge-green'}};
const ANGEBOT_STATUS={erstellt:{label:'Erstellt',cls:'badge-gray'},versendet:{label:'Versendet',cls:'badge-blue'},angenommen:{label:'Angenommen',cls:'badge-green'},abgelehnt:{label:'Abgelehnt',cls:'badge-red'}};
const RECHNUNG_STATUS={erstellt:{label:'Erstellt',cls:'badge-gray'},versendet:{label:'Versendet',cls:'badge-blue'},bezahlt:{label:'Bezahlt',cls:'badge-green'},ueberfaellig:{label:'Überfällig',cls:'badge-red'},storniert:{label:'Storniert',cls:'badge-red'}};
const ZEIT_STATUS={offen:{label:'Offen',cls:'badge-gray'},genehmigt:{label:'Genehmigt',cls:'badge-green'},abgelehnt:{label:'Abgelehnt',cls:'badge-red'}};

/* ===== SECTION 2: AUTH & ROUTER ===== */
let currentUser=null;
let timerInterval=null;

function getSession(){
  const s=DB.session();
  if(!s)return null;
  const emp=DB.getById('mitarbeiter',s.userId);
  if(!emp)return null;
  currentUser=emp;
  return emp;
}
function login(id,pin){
  const emp=DB.getById('mitarbeiter',id);
  if(!emp)return false;
  if(emp.pin!==pin)return false;
  currentUser=emp;
  DB.session({userId:emp.id,rolle:emp.rolle,loginTime:Date.now()});
  return true;
}
function logout(){
  currentUser=null;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  DB.session(null);
  location.hash='#/login';
  render();
}
function isGF(){return currentUser&&currentUser.rolle==='GF';}
function isBU(){return currentUser&&currentUser.rolle==='BU';}
function isMO(){return currentUser&&currentUser.rolle==='MO';}
function canAccess(roles){if(!currentUser)return false;return roles.includes(currentUser.rolle);}

const ROUTES={
  '#/login':{render:renderLogin,roles:null},
  '#/dashboard':{render:renderDashboard,roles:['GF','BU','MO']},
  '#/auftraege':{render:renderAuftraege,roles:['GF','BU','MO']},
  '#/kunden':{render:renderKunden,roles:['GF','BU']},
  '#/zeit':{render:renderZeit,roles:['GF','BU','MO']},
  '#/angebote':{render:renderAngebote,roles:['GF','BU']},
  '#/rechnungen':{render:renderRechnungen,roles:['GF','BU']},
  '#/material':{render:renderMaterial,roles:['GF','BU','MO']},
  '#/personal':{render:renderPersonal,roles:['GF','BU']},
  '#/berichte':{render:renderBerichte,roles:['GF','BU']},
  '#/einstellungen':{render:renderEinstellungen,roles:['GF']}
};

function getRoute(){return location.hash||'#/login';}
function getRouteBase(){return getRoute().split('/').slice(0,2).join('/');}
function getRouteParam(){const p=getRoute().split('/');return p.length>2?p.slice(2).join('/'):null;}

function render(){
  const hash=getRoute();
  const base=getRouteBase();
  if(!currentUser&&base!=='#/login'){location.hash='#/login';return;}
  const route=ROUTES[base];
  if(!route){location.hash='#/dashboard';return;}
  if(route.roles&&!canAccess(route.roles)){location.hash='#/dashboard';showToast('Kein Zugriff','error');return;}
  const app=document.getElementById('app');
  if(base==='#/login'){
    app.innerHTML=renderLoginScreen();
    bindLoginEvents();
    return;
  }
  app.innerHTML=renderShell();
  const content=document.getElementById('pageContent');
  const param=getRouteParam();
  route.render(content,param);
}
window.addEventListener('hashchange',render);

  const nav=getNavItems();

function renderLoginScreen(){
  const emps=DB.getAll('mitarbeiter').filter(e=>e.aktiv);
  const groups={GF:[],BU:[],MO:[]};
  emps.forEach(e=>(groups[e.rolle]||[]).push(e));
  let opts='<option value="">-- Mitarbeiter wählen --</option>';
  if(groups.GF.length) opts+=`<optgroup label="Geschäftsführung">${groups.GF.map(e=>`<option value="${e.id}">${e.vorname} ${e.nachname}</option>`).join('')}</optgroup>`;
  if(groups.BU.length) opts+=`<optgroup label="Büro">${groups.BU.map(e=>`<option value="${e.id}">${e.vorname} ${e.nachname}</option>`).join('')}</optgroup>`;
  if(groups.MO.length) opts+=`<optgroup label="Monteure">${groups.MO.map(e=>`<option value="${e.id}">${e.vorname} ${e.nachname}</option>`).join('')}</optgroup>`;

    <div class="form-group"><label>Mitarbeiter</label><select id="loginEmp">${opts}</select></div>
    <div class="form-group"><label>PIN (4-stellig)</label><input id="loginPin" type="password" maxlength="4" inputmode="numeric" placeholder="****"></div>
    <button class="btn btn-primary btn-block mt-8" id="loginBtn">Anmelden</button>
    <p id="loginError" class="mt-8" style="color:var(--red2);font-size:13px;text-align:center"></p>
  </div></div>`;
}
function renderLogin(){}
function bindLoginEvents(){
  const btn=document.getElementById('loginBtn');
  if(!btn)return;
  btn.onclick=()=>{
    const id=document.getElementById('loginEmp').value;
    const pin=document.getElementById('loginPin').value;
    if(!id){document.getElementById('loginError').textContent='Bitte Mitarbeiter wählen.';return;}
    if(pin.length!==4){document.getElementById('loginError').textContent='PIN muss 4-stellig sein.';return;}
    if(login(id,pin)){location.hash='#/dashboard';render();}
    else{document.getElementById('loginError').textContent='Falscher PIN.';}
  };
  document.getElementById('loginPin').addEventListener('keydown',e=>{if(e.key==='Enter')btn.click();});
}

/* ===== TIMER FUNCTIONS ===== */
function startTimer(typ){
  const auftragId=document.getElementById('timerAuftrag')?.value||null;
  if(typ==='arbeit'&&!auftragId){showToast('Bitte Auftrag wählen','error');return;}
  const active=DB.getAll('zeitlog').find(z=>z.mitarbeiterId===currentUser.id&&!z.ende);
  if(active){showToast('Timer läuft bereits','error');return;}
  DB.save('zeitlog',{id:DB.genId('ZE'),mitarbeiterId:currentUser.id,auftragId,typ,start:Date.now(),ende:null,dauer:0,status:'offen',notiz:''});
  showToast(typ==='arbeit'?'Arbeitszeit gestartet':typ==='pause'?'Pause gestartet':'Fahrtzeit gestartet','success');
  render();
}
function stopTimer(){
  const active=DB.getAll('zeitlog').find(z=>z.mitarbeiterId===currentUser.id&&!z.ende);
  if(!active)return;
  active.ende=Date.now();
  active.dauer=active.ende-active.start;
  DB.save('zeitlog',active);
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  showToast('Timer gestoppt – '+fmtDur(active.dauer),'success');
  render();
}
function startTimerDisplay(startTime){
  if(timerInterval)clearInterval(timerInterval);
  const el=document.getElementById('activeTimerDisplay');
  function update(){
    if(!el||!document.getElementById('activeTimerDisplay'))return clearInterval(timerInterval);
    const d=Date.now()-startTime;
    const h=String(Math.floor(d/3600000)).padStart(2,'0');
    const m=String(Math.floor((d%3600000)/60000)).padStart(2,'0');
    const s=String(Math.floor((d%60000)/1000)).padStart(2,'0');
    el.textContent=h+':'+m+':'+s;
  }
  update();
  timerInterval=setInterval(update,1000);
}

function renderRePos(){
  const c=document.getElementById('rePosContainer');if(!c)return;
  c.innerHTML=`<table class="line-items"><thead><tr><th>Pos</th><th>Bezeichnung</th><th>Einheit</th><th class="text-right">Menge</th><th class="text-right">Preis</th><th></th></tr></thead><tbody>
  ${rechnungPositionen.map((p,i)=>`<tr>

    <td><select onchange="rechnungPositionen[${i}].einheit=this.value">${['Stk','Std','m','m²','psch','Set'].map(e=>`<option ${p.einheit===e?'selected':''}>${e}</option>`).join('')}</select></td>
    <td><input type="number" step="0.01" value="${p.menge}" onchange="rechnungPositionen[${i}].menge=parseFloat(this.value)||0;updateReSum()"></td>

function updateReSum(){
  const s=calcPositionen(rechnungPositionen);
  const el=document.getElementById('rePosSumme');
  if(el) el.innerHTML=`<table class="sum-table"><tr><td>Netto</td><td class="text-right">${fmt(s.netto)}</td></tr><tr><td>MwSt 19%</td><td class="text-right">${fmt(s.mwst)}</td></tr><tr class="total"><td><strong>Brutto</strong></td><td class="text-right"><strong>${fmt(s.brutto)}</strong></td></tr></table>`;
}
function addRePos(){rechnungPositionen.push({pos:rechnungPositionen.length+1,bezeichnung:'',einheit:'Stk',menge:1,einzelpreis:0});renderRePos();}
function saveRechnung(editId){
  if(rechnungPositionen.filter(p=>p.bezeichnung).length===0){showToast('Mindestens eine Position','error');return;}
  const data=editId?DB.getById('rechnungen',editId):{id:DB.genId('RE'),nummer:DB.nextNr('RE'),status:'erstellt',bezahltAm:null,bezahltBetrag:0};

}

  ${r.positionen.map(p=>`<tr><td>${p.pos}</td><td>${p.bezeichnung}</td><td>${p.einheit}</td><td class="right">${fmtN(p.menge)}</td><td class="right">${fmt(p.einzelpreis)}</td><td class="right">${fmt(p.menge*p.einzelpreis)}</td></tr>`).join('')}
  </tbody></table>

  <h2 class="mb-12">Material & Lager</h2>
  ${lowStock.length>0?`<div class="card" style="border-color:var(--red2)"><div class="card-title" style="color:var(--red2)">Nachbestellung nötig (${lowStock.length})</div>
    ${lowStock.map(m=>`<div class="list-item"><div class="list-item-main"><div class="list-item-title">${m.bezeichnung}</div><div class="list-item-sub">Bestand: ${m.bestand} ${m.einheit} · Mindest: ${m.mindestbestand}</div></div><span class="badge badge-red">Niedrig</span></div>`).join('')}

    ${materials.map(m=>`<tr data-kat="${m.kategorie}" data-search="${(m.bezeichnung+m.artikelNr).toLowerCase()}" onclick="showMaterialDetail('${m.id}')" style="cursor:pointer">
      <td>${m.artikelNr}</td><td>${m.bezeichnung}</td><td>${m.kategorie}</td>
      <td class="text-right"><span class="badge ${m.bestand<=m.mindestbestand?'badge-red':'badge-green'}">${m.bestand} ${m.einheit}</span></td>
      <td class="text-right">${m.verkaufspreis>0?fmt(m.verkaufspreis):'-'}</td>

function filterMaterialKat(chip,kat){
  document.querySelectorAll('.filter-chips .chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');

    tr.style.display=kat==='alle'||tr.dataset.kat===kat?'':'none';
  });
}
function filterMat(){
  const q=document.getElementById('searchMat').value.toLowerCase();
  document.querySelectorAll('#materialListe tbody tr').forEach(tr=>{
    tr.style.display=tr.dataset.search.includes(q)?'':'none';
  });
}

function showStockForm(id,typ){
  showModal(typ==='zugang'?'Zugang buchen':'Abgang buchen',`
    <div class="form-group"><label>Menge</label><input type="number" id="fStockMenge" value="1" min="1"></div>
    <button class="btn ${typ==='zugang'?'btn-success':'btn-danger'} btn-block mt-8" onclick="saveStock('${id}','${typ}')">Buchen</button>
  `);
}
function saveStock(id,typ){
  const m=DB.getById('material',id);
  const menge=parseInt(document.getElementById('fStockMenge').value)||0;
  if(menge<=0){showToast('Ungültige Menge','error');return;}
  if(typ==='zugang') m.bestand+=menge; else{if(m.bestand<menge){showToast('Nicht genug auf Lager','error');return;}m.bestand-=menge;}
  DB.save('material',m);
  closeModal();showToast(`${menge} ${m.einheit} ${typ==='zugang'?'hinzugefügt':'entnommen'}`,'success');render();
}
function showMaterialForm(editId){
  const m=editId?DB.getById('material',editId):{};
  showModal(editId?'Material bearbeiten':'Neues Material',`
    <div class="row-2"><div class="form-group"><label>Art.-Nr. *</label><input id="fMtNr" value="${m.artikelNr||''}"></div><div class="form-group"><label>Kategorie</label><select id="fMtKat">${['Heizkessel','Rohre','Armaturen','Pumpen','Regelung','Werkzeug','Verbrauchsmaterial'].map(k=>`<option ${m.kategorie===k?'selected':''}>${k}</option>`).join('')}</select></div></div>
    <div class="form-group"><label>Bezeichnung *</label><input id="fMtBez" value="${m.bezeichnung||''}"></div>
    <div class="row-2"><div class="form-group"><label>Einheit</label><select id="fMtEin">${['Stk','Set','Rolle','m','L','kg'].map(e=>`<option ${m.einheit===e?'selected':''}>${e}</option>`).join('')}</select></div><div class="form-group"><label>Lieferant</label><input id="fMtLief" value="${m.lieferant||''}"></div></div>
    <div class="row-2"><div class="form-group"><label>EK-Preis</label><input type="number" step="0.01" id="fMtEK" value="${m.einkaufspreis||0}"></div><div class="form-group"><label>VK-Preis</label><input type="number" step="0.01" id="fMtVK" value="${m.verkaufspreis||0}"></div></div>
    <div class="row-2"><div class="form-group"><label>Bestand</label><input type="number" id="fMtBest" value="${m.bestand||0}"></div><div class="form-group"><label>Mindestbestand</label><input type="number" id="fMtMin" value="${m.mindestbestand||0}"></div></div>
    <button class="btn btn-primary btn-block mt-12" onclick="saveMaterial('${editId||''}')">Speichern</button>
  `);
}
function saveMaterial(editId){
  const bez=document.getElementById('fMtBez').value.trim();
  if(!bez){showToast('Bezeichnung ist erforderlich','error');return;}
  const data=editId?DB.getById('material',editId):{id:DB.genId('MT')};
  data.artikelNr=document.getElementById('fMtNr').value;data.kategorie=document.getElementById('fMtKat').value;
  data.bezeichnung=bez;data.einheit=document.getElementById('fMtEin').value;data.lieferant=document.getElementById('fMtLief').value;
  data.einkaufspreis=parseFloat(document.getElementById('fMtEK').value)||0;data.verkaufspreis=parseFloat(document.getElementById('fMtVK').value)||0;
  data.bestand=parseInt(document.getElementById('fMtBest').value)||0;data.mindestbestand=parseInt(document.getElementById('fMtMin').value)||0;
  DB.save('material',data);closeModal();showToast('Material gespeichert','success');render();
}

function showPersonalDetail(id){

  const urlaubGenommen=urlaube.filter(u=>u.typ==='urlaub'&&u.status==='genehmigt'&&new Date(u.von).getFullYear()===jahr).reduce((s,u)=>{return s+(new Date(u.bis)-new Date(u.von))/(86400000)+1;},0);
  const krankTage=urlaube.filter(u=>u.typ==='krank'&&new Date(u.von).getFullYear()===jahr).reduce((s,u)=>{return s+(new Date(u.bis)-new Date(u.von))/(86400000)+1;},0);

  showModal(m.vorname+' '+m.nachname,`

    <div class="row-3 mb-12">

      <div class="kpi-card"><div class="kpi-value" style="font-size:16px">${urlaubGenommen}/${m.urlaubTage}</div><div class="kpi-label">Urlaub ${jahr}</div></div>
      <div class="kpi-card"><div class="kpi-value" style="font-size:16px">${krankTage}</div><div class="kpi-label">Krankheitstage</div></div>
    </div>
    ${canAccess(['GF'])?`<div class="btn-group mb-12"><button class="btn btn-sm" onclick="closeModal();showUrlaubForm('${id}')">Urlaub/Krank erfassen</button></div>`:''}
    ${urlaube.length>0?`<div><label>Abwesenheiten</label><table><thead><tr><th>Von</th><th>Bis</th><th>Typ</th><th>Status</th></tr></thead><tbody>
      ${urlaube.map(u=>`<tr><td>${fmtDI(u.von)}</td><td>${fmtDI(u.bis)}</td><td>${u.typ==='urlaub'?'Urlaub':'Krank'}</td><td>${u.status==='genehmigt'?'<span class="badge badge-green">Genehmigt</span>':u.status==='abgelehnt'?'<span class="badge badge-red">Abgelehnt</span>':'<span class="badge badge-gray">Offen</span>'}</td></tr>`).join('')}

  showModal('Abwesenheit erfassen',`
    <div class="form-group"><label>Typ</label><select id="fUrlTyp"><option value="urlaub">Urlaub</option><option value="krank">Krank</option></select></div>
    <div class="row-2"><div class="form-group"><label>Von</label><input type="date" id="fUrlVon" value="${today()}"></div><div class="form-group"><label>Bis</label><input type="date" id="fUrlBis" value="${today()}"></div></div>
    <button class="btn btn-primary btn-block mt-8" onclick="saveUrlaub('${mitarbeiterId}')">Speichern</button>
  `);
}
function saveUrlaub(mitarbeiterId){
  const typ=document.getElementById('fUrlTyp').value;
  const von=document.getElementById('fUrlVon').value;
  const bis=document.getElementById('fUrlBis').value;
  if(!von||!bis||new Date(bis)<new Date(von)){showToast('Ungültiger Zeitraum','error');return;}
  DB.save('urlaub',{id:DB.genId('UR'),mitarbeiterId,typ,von,bis,status:typ==='krank'?'genehmigt':'genehmigt'});
  closeModal();showToast('Abwesenheit gespeichert','success');render();
}

/* ===== SECTION 11: BERICHTE ===== */
function renderBerichte(el){
  el.innerHTML=`
  <h2 class="mb-12">Berichte</h2>
  <div class="card"><div class="card-title">Umsatzübersicht</div><div id="chartUmsatz"></div></div>
  <div class="card"><div class="card-title">Offene Posten</div><div id="reportOP"></div></div>
  <div class="card"><div class="card-title">Mitarbeiter-Auslastung</div><div id="reportAuslastung"></div></div>
  <div class="card"><div class="card-title">Projekt-Rentabilität</div><div id="reportProjekte"></div></div>
  <div class="btn-group mt-8"><button class="btn btn-sm" onclick="exportBerichtCSV()">CSV Export (Rechnungen)</button></div>`;
  renderUmsatzChart();renderOffenePosten();renderAuslastung();renderProjektRent();
}
function renderUmsatzChart(){
  const rechnungen=DB.getAll('rechnungen').filter(r=>r.status==='bezahlt');
  const monate={};
  for(let i=5;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label=d.toLocaleString('de-DE',{month:'short',year:'2-digit'});
    monate[key]={label,summe:0};
  }
  rechnungen.forEach(r=>{
    if(!r.bezahltAm)return;
    const d=new Date(r.bezahltAm);
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(monate[key]) monate[key].summe+=calcPositionen(r.positionen).brutto;
  });
  const vals=Object.values(monate);
  const max=Math.max(...vals.map(v=>v.summe),1);
  document.getElementById('chartUmsatz').innerHTML=`
    <div class="chart-bar-container">
      ${vals.map(v=>`<div class="chart-bar" style="height:${Math.max((v.summe/max)*100,2)}%">
        <span class="chart-bar-value">${v.summe>0?fmt(v.summe):''}</span>
        <span class="chart-bar-label">${v.label}</span>
      </div>`).join('')}
    </div>`;
}
function renderOffenePosten(){
  const rechnungen=DB.getAll('rechnungen').filter(r=>r.status==='versendet'||r.status==='ueberfaellig');
  const now=Date.now();
  const buckets={'0-30':[],'31-60':[],'61-90':[],'90+':[]};
  rechnungen.forEach(r=>{
    const age=Math.floor((now-r.erstellt)/86400000);
    if(age<=30) buckets['0-30'].push(r);
    else if(age<=60) buckets['31-60'].push(r);
    else if(age<=90) buckets['61-90'].push(r);
    else buckets['90+'].push(r);
  });
  const el=document.getElementById('reportOP');
  el.innerHTML=`<table><thead><tr><th>Alter</th><th class="text-right">Anzahl</th><th class="text-right">Summe</th></tr></thead><tbody>
    ${Object.entries(buckets).map(([k,v])=>`<tr><td>${k} Tage</td><td class="text-right">${v.length}</td><td class="text-right">${fmt(v.reduce((s,r)=>s+calcPositionen(r.positionen).brutto,0))}</td></tr>`).join('')}
    <tr style="font-weight:bold"><td>Gesamt</td><td class="text-right">${rechnungen.length}</td><td class="text-right">${fmt(rechnungen.reduce((s,r)=>s+calcPositionen(r.positionen).brutto,0))}</td></tr>
  </tbody></table>`;
}
function renderAuslastung(){
  const monteure=DB.getAll('mitarbeiter').filter(m=>m.rolle==='MO'&&m.aktiv);
  const monat=new Date().getMonth();const jahr=new Date().getFullYear();
  const el=document.getElementById('reportAuslastung');
  const arbeitsTageMonat=22;const sollStunden=arbeitsTageMonat*8;
  el.innerHTML=`<table><thead><tr><th>Mitarbeiter</th><th class="text-right">Ist-Stunden</th><th class="text-right">Soll</th><th class="text-right">Auslastung</th></tr></thead><tbody>
    ${monteure.map(m=>{
      const stunden=DB.getAll('zeitlog').filter(z=>z.mitarbeiterId===m.id&&z.typ==='arbeit'&&z.dauer&&new Date(z.start).getMonth()===monat&&new Date(z.start).getFullYear()===jahr).reduce((s,z)=>s+z.dauer,0)/3600000;
      const auslastung=sollStunden>0?Math.round(stunden/sollStunden*100):0;
      return`<tr><td>${m.vorname} ${m.nachname}</td><td class="text-right">${Math.round(stunden)}h</td><td class="text-right">${sollStunden}h</td><td class="text-right"><span class="badge ${auslastung>=80?'badge-green':auslastung>=50?'badge-orange':'badge-red'}">${auslastung}%</span></td></tr>`;
    }).join('')}
  </tbody></table>`;
}
function renderProjektRent(){
  const projekte=DB.getAll('projekte');
  const el=document.getElementById('reportProjekte');
  const st=DB.settings();
  el.innerHTML=`<table><thead><tr><th>Projekt</th><th class="text-right">Umsatz</th><th class="text-right">Lohnkosten</th><th class="text-right">Material</th><th class="text-right">Gewinn</th></tr></thead><tbody>
    ${projekte.map(p=>{
      const auftraege=DB.getAll('auftraege').filter(a=>a.projektId===p.id);
      const auftragIds=auftraege.map(a=>a.id);
      const umsatz=DB.getAll('rechnungen').filter(r=>r.status==='bezahlt'&&auftragIds.includes(r.auftragId)).reduce((s,r)=>s+calcPositionen(r.positionen).brutto,0);
      const stunden=DB.getAll('zeitlog').filter(z=>z.typ==='arbeit'&&z.dauer&&auftragIds.includes(z.auftragId)).reduce((s,z)=>s+z.dauer,0)/3600000;
      const lohnkosten=stunden*st.stundensatz;
      const matKosten=DB.getAll('materialUsage').filter(u=>auftragIds.includes(u.auftragId)).reduce((s,u)=>{const m=DB.getById('material',u.materialId);return s+u.menge*(m?.einkaufspreis||0);},0);
      const gewinn=umsatz-lohnkosten-matKosten;
      return`<tr><td>${p.name}</td><td class="text-right">${fmt(umsatz)}</td><td class="text-right">${fmt(lohnkosten)}</td><td class="text-right">${fmt(matKosten)}</td><td class="text-right" style="color:${gewinn>=0?'var(--green2)':'var(--red2)'}">${fmt(gewinn)}</td></tr>`;
    }).join('')}
  </tbody></table>`;
}
function exportBerichtCSV(){
  const rechnungen=DB.getAll('rechnungen');
  const csv=['Nummer;Kunde;Status;Netto;MwSt;Brutto;Zahlungsziel;Bezahlt',...rechnungen.map(r=>{const s=calcPositionen(r.positionen);return`${r.nummer};${kundeName(r.kundeId)};${r.status};${fmtN(s.netto)};${fmtN(s.mwst)};${fmtN(s.brutto)};${r.zahlungsziel||''};${r.bezahltAm||''}`;})].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rechnungen-export.csv';a.click();URL.revokeObjectURL(a.href);
  showToast('CSV exportiert','success');
}

/* ===== SECTION 12: EINSTELLUNGEN ===== */
function renderEinstellungen(el){
  const st=DB.settings();
  el.innerHTML=`
  <h2 class="mb-12">Einstellungen</h2>
  <div class="card"><div class="card-title">Firmendaten</div>
    <div class="form-group"><label>Firmenname</label><input id="sName" value="${st.name}"></div>
    <div class="row-2"><div class="form-group"><label>Straße</label><input id="sStr" value="${st.strasse}"></div><div class="row-2"><div class="form-group"><label>PLZ</label><input id="sPlz" value="${st.plz}"></div><div class="form-group"><label>Ort</label><input id="sOrt" value="${st.ort}"></div></div></div>
    <div class="row-2"><div class="form-group"><label>Telefon</label><input id="sTel" value="${st.telefon}"></div><div class="form-group"><label>E-Mail</label><input id="sEmail" value="${st.email}"></div></div>
    <div class="row-2"><div class="form-group"><label>Steuernummer</label><input id="sStNr" value="${st.steuernr}"></div><div class="form-group"><label>USt-IdNr</label><input id="sUst" value="${st.ustid}"></div></div>
    <div class="form-group"><label>Bank</label><input id="sBank" value="${st.bank}"></div>
    <div class="row-2"><div class="form-group"><label>IBAN</label><input id="sIban" value="${st.iban}"></div><div class="form-group"><label>BIC</label><input id="sBic" value="${st.bic}"></div></div>
    <div class="row-2"><div class="form-group"><label>Stundensatz (€)</label><input type="number" id="sStd" value="${st.stundensatz}"></div><div class="form-group"><label>Zahlungsziel (Tage)</label><input type="number" id="sZiel" value="${st.zahlungsziel}"></div></div>
    <button class="btn btn-primary mt-8" onclick="saveSettings()">Speichern</button>
  </div>
  <div class="card"><div class="card-title">Datensicherung</div>
    <div class="btn-group">
      <button class="btn btn-success btn-sm" onclick="exportBackup()">Backup (JSON Export)</button>
      <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">Wiederherstellen</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)">
    </div>
  </div>
  <div class="card"><div class="card-title" style="color:var(--red2)">Gefahrenzone</div>
    <button class="btn btn-danger btn-sm" onclick="resetData()">Alle Daten zurücksetzen</button>
  </div>`;
}
function saveSettings(){
  const st={name:document.getElementById('sName').value,strasse:document.getElementById('sStr').value,plz:document.getElementById('sPlz').value,ort:document.getElementById('sOrt').value,telefon:document.getElementById('sTel').value,email:document.getElementById('sEmail').value,steuernr:document.getElementById('sStNr').value,ustid:document.getElementById('sUst').value,bank:document.getElementById('sBank').value,iban:document.getElementById('sIban').value,bic:document.getElementById('sBic').value,stundensatz:parseFloat(document.getElementById('sStd').value)||65,zahlungsziel:parseInt(document.getElementById('sZiel').value)||14};
  DB.settings(st);showToast('Einstellungen gespeichert','success');
}
function exportBackup(){
  const data={};
  ['mitarbeiter','kunden','projekte','auftraege','angebote','rechnungen','material','materialUsage','zeitlog','urlaub'].forEach(k=>{data[k]=DB.getAll(k);});
  data.counters=DB._gs('counters');data.settings=DB.settings();data.exportDatum=new Date().toISOString();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='shk-erp-backup-'+today()+'.json';a.click();
  showToast('Backup erstellt','success');
}
function importBackup(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    showConfirm('Alle aktuellen Daten werden überschrieben. Fortfahren?',()=>{
      try{
        const data=JSON.parse(e.target.result);
        ['mitarbeiter','kunden','projekte','auftraege','angebote','rechnungen','material','materialUsage','zeitlog','urlaub'].forEach(k=>{if(data[k])DB._s(k,data[k]);});
        if(data.counters)DB._ss('counters',data.counters);
        if(data.settings)DB._ss('settings',data.settings);
        showToast('Daten wiederhergestellt','success');render();
      }catch(err){showToast('Ungültige Datei','error');}
    });
  };
  reader.readAsText(file);
}
function resetData(){
  showConfirm('ALLE Daten werden unwiderruflich gelöscht! Wirklich fortfahren?',()=>{
    ['mitarbeiter','kunden','projekte','auftraege','angebote','rechnungen','material','materialUsage','zeitlog','urlaub'].forEach(k=>localStorage.removeItem('erp_'+k));
    localStorage.removeItem('erp_counters');localStorage.removeItem('erp_settings');localStorage.removeItem('erp_session');localStorage.removeItem('erp_seeded');
    currentUser=null;DB.seed();showToast('Daten zurückgesetzt','success');location.hash='#/login';render();
  });
}

/* ===== SECTION 13: MORE MENU & INIT ===== */
document.addEventListener('click',e=>{
  const moreBtn=e.target.closest('.bottom-nav a[title="Mehr"]');
  if(moreBtn){
    e.preventDefault();
    const items=getNavItems();
    const more=items.find(i=>i.onclick);
    if(!more||!more.moreItems)return;
    showModal('Weitere Module',`
      ${more.moreItems.map(m=>`<div class="list-item" onclick="closeModal();location.hash='${m.hash}'">
        <div class="list-item-main"><div class="list-item-title">${m.label}</div></div>
      </div>`).join('')}
    `);
    return;
  }
});

/* ===== PWA SERVICE WORKER ===== */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* ===== APP INIT ===== */
DB.seed();
const savedSession=getSession();
if(savedSession){
  if(!location.hash||location.hash==='#/'||location.hash==='#/login') location.hash='#/dashboard';
  render();
} else {
  location.hash='#/login';
  render();
}
</script>
</body>
</html>
